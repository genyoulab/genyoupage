<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olive Glow Booster - Hero Section</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-deep: #3F5A0F;
            --color-tint: #A8C36A;
            --color-gold: #C9A227;
            --color-white: #FFFFFF;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* Hero Section Container */
        .hero-section {
            width: 100%;
            height: 720px;
            background-color: var(--color-deep);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
            overflow: hidden;
        }

        /* Copy Content (Left Side) */
        .hero-content {
            flex: 1;
            max-width: 600px;
            color: var(--color-white);
            /* Initial state for fade-in up animation */
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .hero-title {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 24px;
        }

        .hero-subtitle {
            font-size: 24px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
        }

        .highlight-gold {
            color: var(--color-gold);
            font-weight: 700;
        }

        /* Image Frame (Right Side) */
        .hero-visual {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        .img-frame {
            width: 100%;
            max-width: 500px;
            height: 500px;
            border: 1.5px dashed var(--color-tint);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-tint);
            font-size: 18px;
            font-weight: 700;
            background-color: rgba(168, 195, 106, 0.05);
        }

        /* Animations */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile Responsive */
        @media screen and (max-width: 768px) {
            .hero-section {
                height: auto;
                min-height: 720px;
                flex-direction: column;
                justify-content: center;
                text-align: center;
                padding: 60px 5%;
                gap: 50px;
            }

            .hero-title {
                font-size: 32px;
            }

            .hero-subtitle {
                font-size: 20px;
            }

            .hero-visual {
                justify-content: center;
                width: 100%;
            }

            .img-frame {
                height: 400px;
            }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">지중해에서 건너온<br>올리브 워터</h1>
            <p class="hero-subtitle">비타민C 대비 최대 <span class="highlight-gold"><span id="count-target">0</span>×</span> 항산화</p>
        </div>
        
        <div class="hero-visual">
            <img src="./hero_product.jpg" alt="Olive Glow Booster" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const countTarget = document.getElementById('count-target');
            const targetNumber = 30;
            const duration = 1500; // 1.5 seconds
            const startTime = performance.now();

            function easeOutQuart(x) {
                return 1 - Math.pow(1 - x, 4);
            }

            function animateCount(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Applying easing function
                const easedProgress = easeOutQuart(progress);
                const currentNumber = Math.floor(easedProgress * targetNumber);
                
                countTarget.innerText = currentNumber;

                if (progress < 1) {
                    requestAnimationFrame(animateCount);
                } else {
                    countTarget.innerText = targetNumber;
                }
            }

            // Start count up animation slightly after page load for better visual effect
            setTimeout(() => {
                requestAnimationFrame(animateCount);
            }, 300);
        });
    </script>
</body>
</html>
