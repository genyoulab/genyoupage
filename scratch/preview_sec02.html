<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenYou Olive Glow Booster</title>
    <!-- Fonts -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Allerta+Stencil&display=swap" rel="stylesheet">
    <style>
        /* Color Variables */
        :root {
            --main: #658D1B;
            --deep: #3F5A0F;
            --tint: #A8C36A;
            --pale: #EAF0DC;
            --gold: #C9A227;
            --cream: #FAFAF5;
            --text: #2A2A22;
        }

        /* Global Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            color: var(--text);
            background-color: var(--cream);
            line-height: 1.7;
            font-size: 16px;
            overflow-x: hidden;
        }
        h1, h2, h3, h4, .title-font {
            font-family: 'Noto Serif KR', serif;
            font-weight: 700;
        }

        /* Layout Container */
        .container {
            max-width: 960px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
        }
        
        /* Image Placeholder */
        .img-frame {
            border: 1.5px dashed var(--tint);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--tint);
            font-size: 14px;
            text-align: center;
            background-color: rgba(168, 195, 106, 0.05);
            width: 100%;
            height: 100%;
        }

        /* Animations */
        .fade-in-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .fade-in-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ==============================
           Section 1: Hero
           ============================== */
        .hero {
            background-color: var(--deep);
            width: 100%;
            height: 720px;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        .hero .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }
        .hero-content {
            flex: 1;
            color: #ffffff;
            z-index: 2;
        }
        /* Section 00: Media Banner */
        .media-banner {
            position: relative;
            width: 100%;
            height: 720px;
            overflow: hidden;
            background-color: var(--deep); /* fallback matching hero section */
        }
        .media-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .hero-title {
            font-size: 42px;
            color: #ffffff;
            margin-bottom: 16px;
            line-height: 1.3;
        }
        .hero-sub {
            font-size: 24px;
            color: var(--tint);
            font-weight: 600;
            margin-bottom: 32px;
        }
        .hero-desc {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 32px;
        }
        .hero-highlight {
            font-size: 18px;
            font-weight: 600;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--gold);
            border-radius: 4px;
        }
        .hero-highlight .gold-text {
            color: var(--gold);
            font-weight: 700;
            font-size: 28px;
            margin: 0 4px;
        }
        .hero-visual {
            flex: 1;
            max-width: 400px;
            height: 500px;
            display: flex;
            justify-content: flex-end;
        }

        /* ==============================
           Section 2: USP
           ============================== */
        .usp {
            background-color: var(--pale);
            padding: 100px 0;
            width: 100%;
        }
        .usp-title {
            text-align: center;
            font-size: 32px;
            margin-bottom: 50px;
            color: var(--text);
        }
        .usp-grid {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .usp-card {
            background-color: var(--cream);
            border-radius: 16px;
            padding: 32px 24px;
            flex: 1;
            min-width: 280px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(168, 195, 106, 0.2);
        }
        .usp-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: rgba(101, 141, 27, 0.1);
            color: var(--main);
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .usp-card h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: var(--deep);
        }
        .usp-card p {
            font-size: 15px;
            color: #555;
            word-break: keep-all;
            line-height: 1.6;
        }

        /* ==============================
           Section 3: 3 Glows
           ============================== */
        .glows {
            background-color: var(--pale);
            padding: 100px 0;
            width: 100%;
        }
        .glows-title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 50px;
            word-break: keep-all;
        }
        .glows-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .glow-card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 32px 24px;
            border-left: 6px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }
        .glow-card h3 {
            font-size: 20px;
            color: var(--deep);
            margin-bottom: 12px;
        }
        .glow-card p {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
            word-break: keep-all;
        }
        .glow-card .gold-text {
            color: var(--gold);
            font-weight: 700;
        }
        .glows-source {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-top: 30px;
        }

        /* ==============================
           Section 4: VS
           ============================== */
        .vs {
            background-color: #ffffff;
            padding: 100px 0;
            width: 100%;
        }
        .vs-title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 50px;
            word-break: keep-all;
        }
        .vs-grid {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            position: relative;
        }
        .vs-card {
            flex: 1;
            padding: 40px 20px;
            border-radius: 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 160px;
        }
        .vs-left {
            background-color: #f9f9f9;
            color: #999;
            border: 1px solid #eaeaea;
        }
        .vs-left .vs-ingredient {
            color: #888;
        }
        .vs-right {
            background-color: var(--pale);
            border: 2px solid var(--main);
            color: var(--deep);
        }
        .vs-type {
            font-size: 16px;
            margin-bottom: 8px;
        }
        .vs-ingredient {
            font-size: 24px;
            font-weight: 700;
        }
        .vs-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: var(--main);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 2;
        }
        .vs-bar {
            background-color: var(--text);
            color: #ffffff;
            text-align: center;
            padding: 30px;
            border-radius: 12px;
            font-size: 18px;
            line-height: 1.6;
            word-break: keep-all;
        }
        .vs-bar .gold-text {
            color: var(--gold);
            font-weight: 700;
            font-size: 24px;
            margin: 0 4px;
        }

        /* ==============================
           Section 5: 6 Benefits
           ============================== */
        .benefits {
            background-color: #ffffff;
            padding: 100px 0;
            width: 100%;
        }
        .benefits-title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 50px;
        }
        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .benefit-card {
            border: 1px solid var(--tint);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            background-color: #ffffff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .benefit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(168, 195, 106, 0.15);
        }
        .benefit-icon {
            color: var(--main);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .benefit-card h3 {
            font-size: 18px;
            color: var(--deep);
            margin-bottom: 12px;
        }
        .benefit-card p {
            font-size: 15px;
            color: #666;
            word-break: keep-all;
            line-height: 1.5;
        }

        /* ==============================
           Section 6: Clinical Results
           ============================== */
        .clinical {
            background-color: var(--deep);
            padding: 100px 0;
            width: 100%;
        }
        .clinical-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .clinical-title {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .clinical-sub {
            color: var(--tint);
            font-size: 15px;
        }
        .clinical-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .clinical-row {
            display: flex;
            gap: 24px;
        }
        .clinical-col {
            flex: 1;
        }
        .clinical-img {
            border-color: var(--gold) !important;
            background-color: #ffffff !important;
            color: var(--text) !important;
            flex-direction: column;
            padding: 40px 20px;
            min-height: 280px;
            font-size: 16px;
        }
        .clinical-img.wide {
            min-height: 320px;
        }
        .clinical-img .frame-label {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .clinical-img .gold-text {
            color: var(--gold);
            font-weight: 700;
            font-size: 36px;
        }
        .clinical-disclaimer {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-top: 40px;
        }

        /* ==============================
           Section 7: Customer Satisfaction
           ============================== */
        .satisfaction {
            background-color: #ffffff;
            padding: 100px 0;
            width: 100%;
        }
        .satisfaction-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 50px;
        }
        .satisfaction-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            margin-bottom: 40px;
        }
        .satisfaction-left {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }
        .satisfaction-circle {
            background-color: var(--pale);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--main);
            box-shadow: 0 10px 25px rgba(101, 141, 27, 0.1);
            position: relative;
        }
        .satisfaction-circle::after {
            content: '';
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            bottom: 6px;
            border-radius: 50%;
            border: 1px dashed var(--main);
            opacity: 0.5;
        }
        .satisfaction-circle .circle-num {
            font-size: 38px;
            font-weight: 700;
            color: var(--main);
            line-height: 1.2;
            z-index: 1;
        }
        .satisfaction-circle .circle-label {
            font-size: 16px;
            color: var(--deep);
            font-weight: 600;
            z-index: 1;
        }
        .satisfaction-right {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .satisfaction-right p {
            font-size: 18px;
            color: #444;
            line-height: 1.6;
            word-break: keep-all;
            max-width: 320px;
        }
        .satisfaction-bottom {
            text-align: center;
            font-size: 18px;
        }
        .satisfaction-bottom .main-text {
            display: inline-block;
            background-color: rgba(101, 141, 27, 0.1);
            color: var(--main);
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 30px;
        }

        /* ==============================
           Section 8: Usage
           ============================== */
        .usage {
            background-color: var(--pale);
            padding: 100px 0;
            width: 100%;
        }
        .usage-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: var(--deep);
            margin-bottom: 60px;
        }
        .usage-steps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 60px;
        }
        .usage-card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 40px 24px;
            text-align: center;
            flex: 1;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            position: relative;
            z-index: 2;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .usage-icon {
            color: var(--main);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .usage-step-num {
            font-size: 14px;
            color: var(--main);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .usage-card h3 {
            font-size: 18px;
            color: var(--text);
            margin-bottom: 12px;
            word-break: keep-all;
            line-height: 1.4;
        }
        .usage-card p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            word-break: keep-all;
        }
        .usage-arrow {
            color: var(--main);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            z-index: 1;
        }
        .usage-timing {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }
        .usage-timing-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--deep);
            margin-bottom: 24px;
        }
        .usage-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .usage-chip {
            background-color: var(--pale);
            color: var(--deep);
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
        }

        /* ==============================
           Section 9: Ingredients & Clean Beauty
           ============================== */
        .ingredients {
            background-color: #ffffff;
            padding: 100px 0;
            width: 100%;
        }
        .ingredients-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 50px;
        }
        .ingredients-content {
            display: flex;
            gap: 40px;
            margin-bottom: 50px;
        }
        .ingredients-left {
            flex: 1.2;
        }
        .ingredients-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }
        .ingredients-frame {
            border: 1.5px dashed var(--tint);
            border-radius: 10px;
            background-color: rgba(168, 195, 106, 0.05);
            padding: 30px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-size: 15px;
            line-height: 1.8;
            word-break: keep-all;
            text-align: justify;
        }
        .ingredients-more-btn {
            display: none;
        }
        .ingredients-prod-img {
            width: 100%;
            height: 100%;
            max-height: 520px;
            object-fit: contain;
            display: block;
            border-radius: 12px;
        }
        .ingredients-label-img {
            width: 100%;
            height: auto;
            max-height: 520px;
            object-fit: contain;
            display: block;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .clean-badge {
            background-color: var(--cream);
            border: 1px solid var(--pale);
            border-radius: 50px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
        }
        .clean-badge:hover {
            transform: translateX(10px);
        }
        .clean-icon {
            background-color: #ffffff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--main);
            box-shadow: 0 2px 8px rgba(101, 141, 27, 0.1);
        }
        .clean-badge span {
            font-weight: 600;
            color: var(--deep);
            font-size: 16px;
        }
        .ingredients-bottom {
            text-align: center;
        }
        .ingredients-bottom .main-text {
            display: inline-block;
            color: var(--main);
            font-weight: 700;
            font-size: 18px;
            background: linear-gradient(to top, rgba(168, 195, 106, 0.3) 30%, transparent 30%);
            padding: 0 4px;
        }

        /* ==============================
           Section 10: Clean Formula
           ============================== */
        .formula {
            background-color: var(--deep);
            padding: 120px 0;
            width: 100%;
        }
        .formula-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            padding: 0 20px;
        }
        .formula-title {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 50px;
            letter-spacing: -0.5px;
        }
        .formula-list {
            list-style: none;
            padding: 0;
            margin: 0 0 60px 0;
            text-align: left;
            display: inline-block;
        }
        .formula-list li {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 24px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            line-height: 1.6;
        }
        .formula-list li:last-child {
            margin-bottom: 0;
        }
        .formula-check {
            color: var(--gold);
            margin-top: 4px;
            flex-shrink: 0;
        }
        .formula-list b {
            color: #ffffff;
            font-weight: 700;
            margin-right: 8px;
        }
        .formula-footer {
            color: var(--tint);
            font-size: 20px;
            font-weight: 600;
            line-height: 1.6;
            word-break: keep-all;
            padding-top: 40px;
            border-top: 1px solid rgba(168, 195, 106, 0.2);
        }

        /* ==============================
           Section 11: Brand Story
           ============================== */
        .story {
            background-color: var(--pale);
            padding: 100px 0;
            width: 100%;
        }
        .story-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .story-left {
            flex-shrink: 0;
        }
        .story-right {
            flex: 1;
        }
        .story-img {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 2px dashed var(--main) !important;
            background-color: #ffffff !important;
            color: var(--main) !important;
        }
        .story-title {
            color: var(--deep);
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.4;
            letter-spacing: -0.5px;
        }
        .story-quote {
            font-size: 16px;
            color: #444;
            line-height: 1.8;
            word-break: keep-all;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }
        .story-quote::before {
            content: "“";
            font-family: 'Noto Serif KR', serif;
            font-size: 120px;
            color: rgba(101, 141, 27, 0.1);
            position: absolute;
            top: -40px;
            left: -30px;
            line-height: 1;
            z-index: -1;
        }
        .story-quote p {
            margin-bottom: 12px;
        }
        .story-quote p:last-child {
            margin-bottom: 0;
        }
        .story-sign {
            text-align: right;
            color: var(--main);
            font-weight: 700;
            font-size: 16px;
        }

        /* 가격 표기 스타일 */
        .hero-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 24px;
        }
        .cta-price {
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 24px;
        }

        /* Section 07.5: Usage Visual Image Block */
        .usage-visual {
            background-color: var(--cream);
            padding: 60px 0;
            text-align: center;
        }
        .visual-img-container {
            max-width: 800px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .visual-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ==============================
           Section 12: Final CTA
           ============================== */
        .cta {
