<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olive Glow Booster - Usage Section</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-main: #658D1B;
            --color-deep: #3F5A0F;
            --color-tint: #A8C36A;
            --color-pale: #EAF0DC;
            --color-text: #2A2A22;
            --color-white: #FFFFFF;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f0f0f0; /* 배경 구분용 (실제 섹션은 흰색) */
            color: var(--color-text);
        }

        /* Usage Section */
        .usage-section {
            width: 100%;
            background-color: var(--color-pale);
            padding: 100px 5%;
            text-align: center;
            overflow: hidden;
        }

        .usage-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 60px;
            color: var(--color-text);
        }

        .steps-container {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            gap: 20px;
        }

        /* Step Card */
        .step-card {
            flex: 1;
            background-color: var(--color-white);
            border-radius: 24px;
            padding: 50px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative;
            
            /* Initial state for animation */
            opacity: 0;
            transform: translateY(40px);
        }

        .step-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(101, 141, 27, 0.1);
        }

        .step-card.active {
            opacity: 1;
            transform: translateY(0);
        }

        .step-icon {
            width: 80px;
            height: 80px;
            background-color: rgba(101, 141, 27, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .step-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--color-main);
        }

        .step-num {
            font-size: 14px;
            font-weight: 800;
            color: var(--color-tint);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .step-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 15px;
        }

        .step-desc {
            font-size: 15px;
            color: #666;
            line-height: 1.5;
            word-break: keep-all;
        }

        /* Step Arrow */
        .step-arrow {
            color: var(--color-main);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .step-arrow.active {
            opacity: 1;
            transform: scale(1);
        }

        .step-arrow svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }

        /* Animation delays */
        .delay-1 { transition-delay: 0s; }
        .delay-arrow-1 { transition-delay: 0.2s; }
        .delay-2 { transition-delay: 0.4s; }
        .delay-arrow-2 { transition-delay: 0.6s; }
        .delay-3 { transition-delay: 0.8s; }

        /* Mobile Responsive */
        @media screen and (max-width: 850px) {
            .steps-container {
                flex-direction: column;
                gap: 15px;
            }

            .step-card {
                width: 100%;
                max-width: 400px;
                padding: 40px 30px;
            }

            .step-arrow {
                transform: rotate(90deg) scale(0.5);
                margin: 10px 0;
            }

            .step-arrow.active {
                transform: rotate(90deg) scale(1);
            }
        }
    </style>
</head>
<body>

    <!-- Spacer to demonstrate scroll effect -->
    <div style="height: 100vh; display:flex; align-items:center; justify-content:center; color:#888;">
        아래로 스크롤하여 섹션 확인 ↓
    </div>

    <section class="usage-section" id="usageSection">
        <h2 class="usage-title">글로우 부스터 3-STEP 루틴</h2>
        
        <div class="steps-container">
            
            <!-- STEP 1: 흔들기 -->
            <div class="step-card delay-1">
                <div class="step-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C10.9 2 10 2.9 10 4V7H7C5.9 7 5 7.9 5 9V20C5 21.1 5.9 22 7 22H17C18.1 22 19 21.1 19 20V9C19 7.9 18.1 7 17 7H14V4C14 2.9 13.1 2 12 2M12 4C12 4 12 4 12 4C12 4 12 4 12 4M7 9H17V13H7V9M7 15H17V20H7V15M11 10V12H13V10H11M11 16V18H13V16H11Z"/></svg>
                </div>
                <div class="step-num">STEP 1</div>
                <h3 class="step-name">흔들기</h3>
                <p class="step-desc">올리브 워터층과 골든 오일층이 완벽히 섞일 수 있도록 가볍게 흔들어 줍니다.</p>
            </div>

            <!-- Arrow -->
            <div class="step-arrow delay-arrow-1">
                <svg viewBox="0 0 24 24"><path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z"/></svg>
            </div>

            <!-- STEP 2: 분사 -->
            <div class="step-card delay-2">
                <div class="step-icon">
                    <svg viewBox="0 0 24 24"><path d="M12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4M11,7H13V9H11V7M11,11H13V17H11V11Z"/></svg>
                </div>
                <div class="step-num">STEP 2</div>
                <h3 class="step-name">분사</h3>
                <p class="step-desc">세안 직후 또는 건조함이 느껴질 때 얼굴에서 15~20cm 거리를 두고 고르게 분사합니다.</p>
            </div>

            <!-- Arrow -->
            <div class="step-arrow delay-arrow-2">
                <svg viewBox="0 0 24 24"><path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z"/></svg>
            </div>

            <!-- STEP 3: 흡수 -->
            <div class="step-card delay-3">
                <div class="step-icon">
                    <!-- Sparkle/Glow Hand Icon Representation -->
                    <svg viewBox="0 0 24 24"><path d="M2.24 21.06A1 1 0 0 0 3.65 21.06L19.91 4.8A2 2 0 0 0 17.08 1.97L.82 18.23A1 1 0 0 0 .82 19.64L2.24 21.06M19.5 10C19 8.5 18 7.5 16.5 7C18 6.5 19 5.5 19.5 4C20 5.5 21 6.5 22.5 7C21 7.5 20 8.5 19.5 10M15 23C14.5 21.5 13.5 20.5 12 20C13.5 19.5 14.5 18.5 15 17C15.5 18.5 16.5 19.5 18 20C16.5 20.5 15.5 21.5 15 23Z"/></svg>
                </div>
                <div class="step-num">STEP 3</div>
                <h3 class="step-name">흡수</h3>
                <p class="step-desc">피부에 내려앉은 보습 입자를 손바닥 온기로 가볍게 감싸 안아 깊숙이 흡수시켜 줍니다.</p>
            </div>
            
        </div>
    </section>

    <!-- Spacer -->
    <div style="height: 50vh;"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const usageSection = document.getElementById('usageSection');
            const elements = document.querySelectorAll('.step-card, .step-arrow');
            
            let animated = false;

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !animated) {
                        animated = true;
                        
                        // Add active class to trigger CSS transitions
                        elements.forEach(el => {
                            el.classList.add('active');
                        });
                    }
                });
            }, { threshold: 0.2 });

            observer.observe(usageSection);
        });
    </script>
</body>
</html>
