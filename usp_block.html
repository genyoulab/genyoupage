<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olive Glow Booster - USP Section</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-main: #658D1B;
            --color-pale: #EAF0DC;
            --color-text: #2A2A22;
            --color-white: #FFFFFF;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--color-text);
        }

        /* USP Section */
        .usp-section {
            width: 100%;
            background-color: var(--color-pale);
            padding: 100px 5%;
            overflow: hidden;
        }

        .usp-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1100px;
            margin: 0 auto;
            gap: 60px;
        }

        /* Left: Visual / Shake Motion Placeholder */
        .usp-visual {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .shake-placeholder {
            width: 100%;
            max-width: 400px;
            height: 500px;
            background: rgba(255, 255, 255, 0.4);
            border: 2px dashed rgba(101, 141, 27, 0.4);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Container Shake Animation */
            animation: shakeMotion 2.5s infinite ease-in-out;
            transform-origin: center bottom;
        }

        .bottle-icon {
            width: 80px;
            height: 160px;
            border: 4px solid var(--color-main);
            border-radius: 40px 40px 10px 10px;
            position: relative;
            margin-bottom: 20px;
            overflow: hidden;
        }

        /* Simulated bi-phase liquid */
        .bottle-icon::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: var(--color-main);
            opacity: 0.8;
            transition: height 0.3s;
        }
        
        .bottle-icon::before {
            content: '';
            position: absolute;
            bottom: 30%;
            left: 0;
            width: 100%;
            height: 50%;
            background: rgba(201, 162, 39, 0.4); /* Gold oil layer */
            transition: bottom 0.3s;
        }

        .shake-text {
            color: var(--color-main);
            font-size: 18px;
            font-weight: 700;
            text-align: center;
        }

        /* Right: USP Content & Cards */
        .usp-content {
            flex: 1.2;
        }

        .usp-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 40px;
            line-height: 1.3;
        }

        .usp-cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .usp-card {
            background-color: var(--color-white);
            border-radius: 16px;
            padding: 24px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .usp-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(101, 141, 27, 0.1);
        }

        .usp-icon {
            flex-shrink: 0;
            width: 50px;
            height: 50px;
            background-color: rgba(101, 141, 27, 0.1);
            color: var(--color-main);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .usp-icon svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        .usp-text h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--color-text);
        }

        .usp-text p {
            font-size: 15px;
            color: #666;
            line-height: 1.4;
        }

        /* Animations */
        @keyframes shakeMotion {
            0% { transform: rotate(0deg); }
            10% { transform: rotate(-6deg); }
            20% { transform: rotate(6deg); }
            30% { transform: rotate(-4deg); }
            40% { transform: rotate(4deg); }
            50% { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }

        /* Animation for card slide in on scroll (optional enhancement) */
        .slide-up {
            opacity: 0;
            transform: translateY(30px);
            animation: slideUpAnim 0.8s forwards;
        }
        
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        @keyframes slideUpAnim {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Responsive */
        @media screen and (max-width: 850px) {
            .usp-container {
                flex-direction: column;
                gap: 40px;
            }

            .usp-visual, .usp-content {
                width: 100%;
            }

            .usp-title {
                font-size: 26px;
                text-align: center;
                margin-bottom: 30px;
            }

            .shake-placeholder {
                height: 350px;
            }

            .usp-card {
                padding: 20px;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <section class="usp-section">
        <div class="usp-container">
            
            <!-- Left Side: Motion Visual -->
            <div class="usp-visual">
                <div class="shake-placeholder">
                    <!-- Simple CSS Graphic representing the bottle -->
                    <div class="bottle-icon"></div>
                    <div class="shake-text">
                        이층 제형<br>흔드는 모션 GIF<br>(여기에 삽입)
                    </div>
                </div>
            </div>

            <!-- Right Side: USP Content -->
            <div class="usp-content">
                <h2 class="usp-title">피부를 위한 완벽한 레시피</h2>
                <div class="usp-cards">
                    
                    <!-- USP 1 -->
                    <div class="usp-card slide-up delay-1">
                        <div class="usp-icon">
                            <!-- Spray/Mist Icon -->
                            <svg viewBox="0 0 24 24">
                                <path d="M12,2C12,2 7,8.268 7,11.5C7,14.261 9.239,16.5 12,16.5C14.761,16.5 17,14.261 17,11.5C17,8.268 12,2 12,2M12,18C8.134,18 5,14.866 5,11.5C5,7.5 12,0 12,0C12,0 19,7.5 19,11.5C19,14.866 15.866,18 12,18Z"/>
                            </svg>
                        </div>
                        <div class="usp-text">
                            <h3>① 이층형 스프레이 미스트</h3>
                            <p>수분 워터와 영양 오일이 결합되어, 가볍게 뿌리는 순간 산뜻하게 흡수</p>
                        </div>
                    </div>

                    <!-- USP 2 -->
                    <div class="usp-card slide-up delay-2">
                        <div class="usp-icon">
                            <!-- Shield/Safe Icon -->
                            <svg viewBox="0 0 24 24">
                                <path d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,20.93C8.06,19.8 5,15.68 5,11.3V6.3L12,3.19L19,6.3V11.3C19,15.68 15.94,19.8 12,20.93M10,16.09L6.46,12.55L7.88,11.13L10,13.26L16.59,6.67L18,8.08L10,16.09Z"/>
                            </svg>
                        </div>
                        <div class="usp-text">
                            <h3>② 계면활성제 무첨가</h3>
                            <p>피부 자극을 최소화하기 위해 화학적 계면활성제를 철저히 배제</p>
                        </div>
                    </div>

                    <!-- USP 3 -->
                    <div class="usp-card slide-up delay-3">
                        <div class="usp-icon">
                            <!-- Flower/Aroma Icon -->
                            <svg viewBox="0 0 24 24">
                                <path d="M12,2C14.21,2 16,3.79 16,6C16,8.21 14.21,10 12,10C9.79,10 8,8.21 8,6C8,3.79 9.79,2 12,2M12,22C9.79,22 8,20.21 8,18C8,15.79 9.79,14 12,14C14.21,14 16,15.79 16,18C16,20.21 14.21,22 12,22M6,8C8.21,8 10,9.79 10,12C10,14.21 8.21,16 6,16C3.79,16 2,14.21 2,12C2,9.79 3.79,8 6,8M18,8C20.21,8 22,9.79 22,12C22,14.21 20.21,16 18,16C15.79,16 14,14.21 14,12C14,9.79 15.79,8 18,8Z"/>
                            </svg>
                        </div>
                        <div class="usp-text">
                            <h3>③ 천연 아로마 (라벤더·일랑일랑)</h3>
                            <p>인공 향료 대신 천연 아로마 오일의 은은한 향으로 깊은 릴랙싱</p>
                        </div>
                    </div>

                </div>
            </div>
            
        </div>
    </section>

</body>
</html>
